<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact - Sumanjit Singh</title>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f7f9fc;
      --surface-warm: #fff8f3;
      --cream: #f6f1e8;
      --ink: #101114;
      --muted: rgba(16,17,20,0.66);
      --line: rgba(16,17,20,0.13);
      --blue: #1f5eff;
      --blue-dark: #17358f;
      --pink: #e94d96;
      --orange: #f26a2e;
      --lime: #d8ff36;
      --font-sans: Inter, "Helvetica Neue", Helvetica, Arial, sans-serif;
      --font-display: "Arial Black", "Helvetica Neue", Helvetica, Arial, sans-serif;
      --font-serif: Georgia, "Times New Roman", serif;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--font-sans); }
    .ss-wrap { width: min(1180px, calc(100% - 40px)); margin: 0 auto; }

    .ss-nav { position: sticky; top: 0; z-index: 100; width: 100%; background: var(--bg); border-bottom: 1px solid var(--line); }
    .ss-nav .ss-wrap { width: calc(100% - 48px); }
    .ss-nav-inner { min-height: 76px; display: flex; align-items: center; justify-content: space-between; gap: 24px; }
    .ss-brand { color: var(--ink); text-decoration: none; }
    .ss-brand strong { display: block; font-family: var(--font-display); font-size: clamp(22px, 2.6vw, 34px); line-height: 0.9; font-weight: 950; letter-spacing: 0.02em; text-transform: uppercase; }
    .ss-brand span { display: block; margin-top: 7px; color: var(--muted); font-size: 11px; font-weight: 850; letter-spacing: 0.12em; text-transform: uppercase; }
    .ss-nav-links, .ss-footer-links { display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
    .ss-nav-links a, .ss-footer-links a { position: relative; color: var(--ink); text-decoration: none; font-size: 13px; font-weight: 900; letter-spacing: 0.08em; text-transform: uppercase; }
    .ss-nav-links a::after { content: ""; position: absolute; left: 0; right: 0; bottom: -8px; height: 4px; background: var(--blue); transform: scaleX(0); transform-origin: left; transition: transform 0.12s ease; }
    .ss-nav-links a:hover, .ss-footer-links a:hover { color: var(--blue); }
    .ss-nav-links a:hover::after, .ss-nav-links a[aria-current="page"]::after { transform: scaleX(1); }

    .ss-contact {
      padding: 0 0 76px;
      background: var(--bg);
    }

    .ss-contact .ss-wrap { width: 100%; max-width: none; }
    .ss-contact-grid { display: grid; gap: 46px; align-items: start; }
    .ss-eyebrow { margin: 0 0 20px; color: var(--blue); font-size: 14px; line-height: 1; font-weight: 900; letter-spacing: 0.16em; text-transform: uppercase; }
    .ss-title { margin: 0; max-width: 680px; font-family: var(--font-display); font-size: clamp(52px, 7.4vw, 106px); line-height: 0.82; letter-spacing: -0.08em; font-weight: 950; text-transform: uppercase; }
    .ss-title span { display: block; }
    .ss-title .outline { color: transparent; -webkit-text-stroke: 1.5px var(--ink); text-stroke: 1.5px var(--ink); }
    .ss-title .colour { background: linear-gradient(90deg, var(--blue), var(--pink), var(--blue)); background-size: 260% 100%; -webkit-background-clip: text; background-clip: text; color: transparent; animation: ssColourMove 6s ease-in-out infinite alternate; }
    @keyframes ssColourMove {
      from { background-position: 0% 50%; }
      to { background-position: 100% 50%; }
    }
    .ss-contact-panel {
      width: 100%;
      min-height: 620px;
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(300px, 0.65fr);
      align-items: center;
      gap: clamp(40px, 7vw, 110px);
      padding: 78px max(20px, calc((100vw - 1180px) / 2)) 64px;
      background: radial-gradient(circle at 82% 12%, rgba(255,78,184,0.12), transparent 26%), radial-gradient(circle at 16% 76%, rgba(36,87,255,0.10), transparent 28%), var(--cream);
      border-bottom: 1px solid var(--line);
    }
    .ss-motion-wrap { display: grid; place-items: center; min-height: 360px; perspective: 900px; }
    .ss-motion-orb {
      --rx: 0deg;
      --ry: 0deg;
      position: relative;
      width: min(30vw, 360px);
      aspect-ratio: 1;
      border-radius: 42% 58% 63% 37% / 45% 35% 65% 55%;
      background: conic-gradient(from 45deg, var(--blue), #7657ff, var(--pink), var(--orange), var(--lime), var(--blue));
      box-shadow: 0 34px 80px rgba(31,94,255,0.24), inset 20px -20px 50px rgba(16,17,20,0.18), inset -18px 18px 42px rgba(255,255,255,0.30);
      transform: rotateX(var(--rx)) rotateY(var(--ry));
      animation: ssOrbMorph 9s ease-in-out infinite, ssOrbTurn 16s linear infinite;
      transition: transform 0.18s ease-out;
      isolation: isolate;
    }
    .ss-motion-orb::before,
    .ss-motion-orb::after { content: ""; position: absolute; border-radius: inherit; pointer-events: none; }
    .ss-motion-orb::before { inset: 12%; background: radial-gradient(circle at 32% 28%, rgba(255,255,255,0.85), transparent 22%), linear-gradient(145deg, rgba(255,255,255,0.22), transparent 55%); mix-blend-mode: screen; }
    .ss-motion-orb::after { inset: -12%; z-index: -1; border: 1px solid rgba(31,94,255,0.22); animation: ssOrbRing 4s ease-in-out infinite; }
    @keyframes ssOrbMorph {
      0%, 100% { border-radius: 42% 58% 63% 37% / 45% 35% 65% 55%; }
      50% { border-radius: 58% 42% 36% 64% / 62% 55% 45% 38%; }
    }
    @keyframes ssOrbTurn { to { filter: hue-rotate(360deg); } }
    @keyframes ssOrbRing { 50% { inset: -18%; transform: rotate(12deg); opacity: 0.45; } }
    .ss-contact-card {
      width: min(590px, calc(100% - 40px));
      margin-left: max(20px, calc((100vw - 1180px) / 2));
      padding: clamp(22px, 4vw, 40px);
      border: 0;
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
    }
    .ss-contact-card h2 { margin: 0 0 26px; font-family: var(--font-display); font-size: clamp(32px, 4vw, 58px); line-height: 0.9; letter-spacing: 0.02em; text-transform: uppercase; }
    .ss-form { display: grid; gap: 18px; }
    .ss-form-row { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
    .ss-field { display: grid; gap: 8px; }
    .ss-field label { color: var(--ink); font-size: 12px; font-weight: 900; letter-spacing: 0.12em; text-transform: uppercase; }
    .ss-field input,
    .ss-field textarea {
      width: 100%;
      border: 0;
      border-bottom: 2px solid var(--ink);
      border-radius: 0;
      background: transparent;
      color: var(--ink);
      font: 500 18px/1.4 var(--font-sans);
      padding: 12px 0;
      outline: none;
    }
    .ss-field textarea { min-height: 150px; resize: vertical; }
    .ss-field input:focus,
    .ss-field textarea:focus { border-color: var(--blue); }
    .ss-submit { width: fit-content; min-height: 50px; border: 0; border-bottom: 4px solid var(--blue); border-radius: 0; background: transparent; color: var(--ink); cursor: pointer; font-family: var(--font-display); font-size: 16px; font-weight: 950; letter-spacing: 0.04em; text-transform: uppercase; }
    .ss-submit:hover { color: var(--blue); border-color: var(--orange); }

    .ss-footer { background: var(--bg); border-top: 1px solid var(--line); padding: 30px 0; }
    .ss-footer-inner { display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
    .ss-footer-brand { margin: 0; font-family: var(--font-display); font-size: 18px; line-height: 1; font-weight: 950; letter-spacing: 0.02em; text-transform: uppercase; }

    @media (max-width: 980px) {
      .ss-nav-inner { min-height: auto; padding: 14px 0; flex-direction: column; align-items: flex-start; }
      .ss-contact-panel { grid-template-columns: minmax(0, 1fr) minmax(240px, 0.55fr); }
    }

    @media (max-width: 640px) {
      .ss-wrap, .ss-nav .ss-wrap { width: min(100% - 26px, 1180px); }
      .ss-contact { padding: 0 0 54px; }
      .ss-contact .ss-wrap { width: 100%; }
      .ss-contact-card { width: min(100% - 26px, 590px); margin-left: 13px; }
      .ss-contact-panel { min-height: 560px; grid-template-columns: 1fr; gap: 30px; padding-top: 54px; padding-bottom: 44px; }
      .ss-title { font-size: clamp(48px, 15vw, 78px); }
      .ss-motion-wrap { min-height: 220px; }
      .ss-motion-orb { width: min(62vw, 250px); }
      .ss-form-row { grid-template-columns: 1fr; }
    }
    @media (prefers-reduced-motion: reduce) {
      .ss-motion-orb, .ss-motion-orb::after { animation: none; transition: none; }
    }
  </style>
</head>
<body>
  <nav class="ss-nav">
    <div class="ss-wrap ss-nav-inner">
      <a class="ss-brand" href="index.html#top">
        <strong>Sumanjit Singh</strong>
        <span>Learning / UX / Multimedia</span>
      </a>
      <div class="ss-nav-links">
        <a href="index.html#top">Home</a>
        <a href="projects.html">Projects</a>
        <a href="design-explore.html">Design Explore</a>
        <a href="cv-me.html">CV Me</a>
        <a href="contact.html" aria-current="page">Contact</a>
      </div>
    </div>
  </nav>

  <main>
    <section class="ss-contact">
      <div class="ss-wrap ss-contact-grid">
        <div class="ss-contact-panel">
          <h1 class="ss-title">
            <span>Start</span>
            <span class="outline">a</span>
            <span class="colour">Conversation.</span>
          </h1>
          <div class="ss-motion-wrap" aria-hidden="true">
            <div class="ss-motion-orb"></div>
          </div>
        </div>

        <aside class="ss-contact-card">
          <h2>Contact Me</h2>
          <form class="ss-form" action="mailto:hello@example.com" method="post" enctype="text/plain">
            <div class="ss-form-row">
              <div class="ss-field">
                <label for="name">Name</label>
                <input id="name" name="name" type="text">
              </div>
              <div class="ss-field">
                <label for="email">Email</label>
                <input id="email" name="email" type="email">
              </div>
            </div>
            <div class="ss-field">
              <label for="project">Project Type</label>
              <input id="project" name="project" type="text">
            </div>
            <div class="ss-field">
              <label for="message">Message</label>
              <textarea id="message" name="message"></textarea>
            </div>
            <button class="ss-submit" type="submit">Send Message</button>
          </form>
        </aside>
      </div>
    </section>
  </main>

  <footer class="ss-footer">
    <div class="ss-wrap ss-footer-inner">
      <p class="ss-footer-brand">Sumanjit Singh</p>
      <div class="ss-footer-links">
        <a href="index.html#top">Home</a>
        <a href="projects.html">Projects</a>
        <a href="design-explore.html">Design Explore</a>
        <a href="cv-me.html">CV Me</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </footer>
  <script src="social-header.js?v=2"></script>
  <script>
    const motionWrap = document.querySelector(".ss-motion-wrap");
    const motionOrb = document.querySelector(".ss-motion-orb");
    const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    if (motionWrap && motionOrb && !reducedMotion) {
      motionWrap.addEventListener("pointermove", (event) => {
        const bounds = motionWrap.getBoundingClientRect();
        const x = (event.clientX - bounds.left) / bounds.width - 0.5;
        const y = (event.clientY - bounds.top) / bounds.height - 0.5;
        motionOrb.style.setProperty("--rx", `${y * -14}deg`);
        motionOrb.style.setProperty("--ry", `${x * 14}deg`);
      });

      motionWrap.addEventListener("pointerleave", () => {
        motionOrb.style.setProperty("--rx", "0deg");
        motionOrb.style.setProperty("--ry", "0deg");
      });
    }
  </script>
</body>
</html>
